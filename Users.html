<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Users — A-Lab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            mono: ['DM Mono', 'monospace'],
          },
          colors: {
            brand: { 50:'#eef6ff',500:'#2f76f5',600:'#1a56eb' },
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }

    .input-field {
      width: 100%; padding: 8px 12px;
      border: 1.5px solid #e2e8f0; border-radius: 8px;
      font-size: 13px; background: #f8fafc; color: #1e293b;
      transition: all 0.15s; outline: none;
    }
    .input-field:focus { border-color: #2f76f5; background: #fff; box-shadow: 0 0 0 3px rgba(47,118,245,0.12); }

    .status-badge {
      font-size: 11px; font-weight: 600; letter-spacing: 0.03em;
      padding: 2px 10px; border-radius: 99px;
    }

    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px); z-index: 50;
      display: flex; align-items: center; justify-content: center;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.3s ease both; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 overflow-auto h-screen">

<div class="p-6 max-w-7xl mx-auto">

  <!-- Header -->
  <div class="flex items-center justify-between mb-6 fade-up">
    <div>
      <h1 class="text-xl font-bold text-slate-800">Users</h1>
      <p class="text-sm text-slate-400 mt-0.5">Manage system users and their access roles.</p>
    </div>
    <button onclick="openCreateModal()"
      class="flex items-center gap-1.5 bg-brand-500 hover:bg-brand-600 text-white text-xs font-semibold px-4 py-2 rounded-lg transition-colors shadow-sm">
      <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
      </svg>
      New User
    </button>
  </div>

  <!-- Role Legend -->
  <div class="flex flex-wrap gap-2 mb-5 fade-up">
    <span class="status-badge bg-violet-50 text-violet-600">SUPER_ADMIN</span>
    <span class="status-badge bg-brand-50 text-brand-600">BRANCH_ADMIN</span>
    <span class="status-badge bg-emerald-50 text-emerald-600">MEDTECH</span>
    <span class="status-badge bg-sky-50 text-sky-600">RECEPTIONIST</span>
    <span class="status-badge bg-amber-50 text-amber-600">DOCTOR</span>
    <span class="status-badge bg-slate-100 text-slate-500">VIEWER</span>
    <span class="text-xs text-slate-400 self-center ml-1">— Role access levels</span>
  </div>

  <!-- Table -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm fade-up">
    <div class="flex items-center justify-between px-5 py-4 border-b border-slate-100">
      <h2 class="text-sm font-bold text-slate-800">All Users</h2>
      <div class="flex items-center gap-2">
        <input type="text" id="search-input" placeholder="Search users…"
          class="text-xs border border-slate-200 rounded-lg px-3 py-1.5 text-slate-600 bg-slate-50 focus:outline-none focus:ring-2 focus:ring-brand-300 w-44"
          oninput="filterUsers()"/>
        <select id="role-filter" class="text-xs border border-slate-200 rounded-lg px-3 py-1.5 text-slate-600 bg-slate-50 focus:outline-none focus:ring-2 focus:ring-brand-300" onchange="filterUsers()">
          <option value="">All Roles</option>
          <option>SUPER_ADMIN</option>
          <option>BRANCH_ADMIN</option>
          <option>MEDTECH</option>
          <option>RECEPTIONIST</option>
          <option>DOCTOR</option>
          <option>VIEWER</option>
        </select>
      </div>
    </div>

    <!-- Loading -->
    <div id="loading-state" class="py-16 flex flex-col items-center gap-3 text-slate-400">
      <div class="w-6 h-6 border-2 border-slate-200 border-t-brand-500 rounded-full animate-spin"></div>
      <p class="text-xs">Loading users…</p>
    </div>

    <!-- Table Body -->
    <div id="table-wrap" class="hidden overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider border-b border-slate-100">
            <th class="text-left px-5 py-3">User</th>
            <th class="text-left px-3 py-3">Username</th>
            <th class="text-left px-3 py-3">Role</th>
            <th class="text-left px-3 py-3 hidden md:table-cell">Branch</th>
            <th class="text-left px-3 py-3 hidden lg:table-cell">Last Login</th>
            <th class="text-left px-3 py-3">Status</th>
            <th class="text-left px-3 py-3">Actions</th>
          </tr>
        </thead>
        <tbody id="users-tbody" class="divide-y divide-slate-50"></tbody>
      </table>
    </div>

    <!-- Empty -->
    <div id="empty-state" class="hidden py-16 flex flex-col items-center gap-3 text-slate-400">
      <svg class="w-10 h-10 text-slate-200" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-1a4 4 0 00-5.196-3.762M9 11a4 4 0 100-8 4 4 0 000 8zm-6 9v-1a4 4 0 014-4h4a4 4 0 014 4v1"/>
      </svg>
      <p class="text-sm">No users found.</p>
    </div>
  </div>
</div>

<!-- ── CREATE USER MODAL ────────────────────────────────────────── -->
<div id="create-modal" class="modal-backdrop hidden" onclick="closeModalOnBackdrop(event)">
  <div class="bg-white rounded-2xl shadow-2xl border border-slate-100 w-full max-w-md mx-4 overflow-hidden">
    <div class="px-6 py-5 border-b border-slate-100 flex items-center justify-between">
      <h3 class="font-bold text-slate-800">Create New User</h3>
      <button onclick="closeModal('create-modal')" class="text-slate-400 hover:text-slate-600">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="px-6 py-5 space-y-4">
      <div id="modal-error" class="hidden text-xs text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2"></div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs font-semibold text-slate-600 mb-1 block">First Name *</label>
          <input type="text" id="new-fname" class="input-field" placeholder="Juan"/>
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-600 mb-1 block">Last Name *</label>
          <input type="text" id="new-lname" class="input-field" placeholder="Dela Cruz"/>
        </div>
      </div>

      <div>
        <label class="text-xs font-semibold text-slate-600 mb-1 block">Username *</label>
        <input type="text" id="new-username" class="input-field" placeholder="jdelacruz" autocapitalize="none"/>
      </div>

      <div>
        <label class="text-xs font-semibold text-slate-600 mb-1 block">Email</label>
        <input type="email" id="new-email" class="input-field" placeholder="juan@alab.com"/>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs font-semibold text-slate-600 mb-1 block">Role *</label>
          <select id="new-role" class="input-field">
            <option value="">Select role…</option>
            <option>SUPER_ADMIN</option>
            <option>BRANCH_ADMIN</option>
            <option>MEDTECH</option>
            <option>RECEPTIONIST</option>
            <option>DOCTOR</option>
            <option>VIEWER</option>
          </select>
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-600 mb-1 block">Branch</label>
          <input type="text" id="new-branch" class="input-field" placeholder="Branch ID"/>
        </div>
      </div>

      <div>
        <label class="text-xs font-semibold text-slate-600 mb-1 block">Temporary Password *</label>
        <input type="password" id="new-password" class="input-field" placeholder="Min. 8 characters"/>
      </div>
    </div>
    <div class="px-6 py-4 border-t border-slate-100 flex gap-2 justify-end">
      <button onclick="closeModal('create-modal')"
        class="px-4 py-2 text-xs font-semibold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors">
        Cancel
      </button>
      <button id="create-btn" onclick="createUser()"
        class="px-4 py-2 text-xs font-semibold text-white bg-brand-500 hover:bg-brand-600 rounded-lg transition-colors shadow-sm">
        Create User
      </button>
    </div>
  </div>
</div>

<script>
  let allUsers = [];
  const token  = sessionStorage.getItem('alab_token') || '';

  // Load users on mount
  google.script.run
    .withSuccessHandler(function(res) {
      document.getElementById('loading-state').classList.add('hidden');
      if (res.success) {
        allUsers = res.users || [];
        renderUsers(allUsers);
      }
    })
    .withFailureHandler(function() {
      document.getElementById('loading-state').classList.add('hidden');
    })
    .clientListUsers(token);

  // ── RENDER ─────────────────────────────────────────────────────
  function roleBadge(role) {
    const map = {
      SUPER_ADMIN:  'bg-violet-50 text-violet-600',
      BRANCH_ADMIN: 'bg-blue-50 text-blue-600',
      MEDTECH:      'bg-emerald-50 text-emerald-600',
      RECEPTIONIST: 'bg-sky-50 text-sky-600',
      DOCTOR:       'bg-amber-50 text-amber-600',
      VIEWER:       'bg-slate-100 text-slate-500',
    };
    return `<span class="status-badge ${map[role] || 'bg-slate-100 text-slate-500'}">${role}</span>`;
  }

  function renderUsers(users) {
    const tbody = document.getElementById('users-tbody');
    const empty = document.getElementById('empty-state');
    const wrap  = document.getElementById('table-wrap');

    if (!users.length) {
      wrap.classList.add('hidden');
      empty.classList.remove('hidden');
      empty.classList.add('flex');
      return;
    }

    empty.classList.add('hidden');
    wrap.classList.remove('hidden');

    tbody.innerHTML = users.map(u => {
      const initials = (u.full_name || 'U').split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
      const lastLogin = u.last_login ? new Date(u.last_login).toLocaleDateString('en-PH', { month: 'short', day: 'numeric', year: 'numeric' }) : 'Never';
      const isActive  = u.is_active === 'TRUE' || u.is_active === true;

      return `
        <tr class="hover:bg-slate-50 transition-colors">
          <td class="px-5 py-3.5">
            <div class="flex items-center gap-2.5">
              <div class="w-8 h-8 rounded-full bg-brand-100 text-brand-600 flex items-center justify-center text-xs font-bold shrink-0">${initials}</div>
              <div>
                <p class="text-xs font-semibold text-slate-700">${u.full_name || '—'}</p>
                <p class="text-[11px] text-slate-400">${u.email || ''}</p>
              </div>
            </div>
          </td>
          <td class="px-3 py-3.5">
            <span class="font-mono text-xs text-slate-600">${u.username}</span>
          </td>
          <td class="px-3 py-3.5">${roleBadge(u.role)}</td>
          <td class="px-3 py-3.5 text-xs text-slate-500 hidden md:table-cell">${u.branch_id || '<span class="text-slate-300">All branches</span>'}</td>
          <td class="px-3 py-3.5 text-xs text-slate-400 hidden lg:table-cell">${lastLogin}</td>
          <td class="px-3 py-3.5">
            <span class="status-badge ${isActive ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-100 text-slate-400'}">
              ${isActive ? 'Active' : 'Inactive'}
            </span>
          </td>
          <td class="px-3 py-3.5">
            <button onclick="toggleUser('${u.user_id}', ${!isActive})"
              class="text-xs font-semibold px-3 py-1 rounded-lg border transition-colors
                ${isActive ? 'border-red-200 text-red-500 hover:bg-red-50' : 'border-emerald-200 text-emerald-600 hover:bg-emerald-50'}">
              ${isActive ? 'Deactivate' : 'Activate'}
            </button>
          </td>
        </tr>`;
    }).join('');
  }

  function filterUsers() {
    const q    = document.getElementById('search-input').value.toLowerCase();
    const role = document.getElementById('role-filter').value;
    const filtered = allUsers.filter(u => {
      const matchQ    = !q || (u.full_name || '').toLowerCase().includes(q) || u.username.toLowerCase().includes(q);
      const matchRole = !role || u.role === role;
      return matchQ && matchRole;
    });
    renderUsers(filtered);
  }

  // ── TOGGLE USER ───────────────────────────────────────────────
  function toggleUser(userId, newState) {
    google.script.run
      .withSuccessHandler(function(res) {
        if (res.success) {
          allUsers = allUsers.map(u => u.user_id === userId ? { ...u, is_active: newState ? 'TRUE' : 'FALSE' } : u);
          filterUsers();
        } else {
          alert(res.error || 'Failed to update user status.');
        }
      })
      .clientToggleUser(token, userId, newState);
  }

  // ── CREATE USER ───────────────────────────────────────────────
  function openCreateModal() {
    document.getElementById('create-modal').classList.remove('hidden');
    document.getElementById('modal-error').classList.add('hidden');
    ['new-fname','new-lname','new-username','new-email','new-branch','new-password'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('new-role').value = '';
  }

  function closeModal(id) {
    document.getElementById(id).classList.add('hidden');
  }

  function closeModalOnBackdrop(e) {
    if (e.target === e.currentTarget) closeModal('create-modal');
  }

  function createUser() {
    const fname    = document.getElementById('new-fname').value.trim();
    const lname    = document.getElementById('new-lname').value.trim();
    const username = document.getElementById('new-username').value.trim();
    const email    = document.getElementById('new-email').value.trim();
    const role     = document.getElementById('new-role').value;
    const branch   = document.getElementById('new-branch').value.trim();
    const password = document.getElementById('new-password').value;

    if (!fname || !lname || !username || !role || !password) {
      showModalError('Please fill in all required fields (*).');
      return;
    }
    if (password.length < 8) {
      showModalError('Password must be at least 8 characters.');
      return;
    }

    document.getElementById('create-btn').disabled = true;
    document.getElementById('create-btn').textContent = 'Creating…';

    google.script.run
      .withSuccessHandler(function(res) {
        document.getElementById('create-btn').disabled = false;
        document.getElementById('create-btn').textContent = 'Create User';

        if (res.success) {
          allUsers.unshift(res.user);
          renderUsers(allUsers);
          closeModal('create-modal');
        } else {
          showModalError(res.error || 'Failed to create user.');
        }
      })
      .withFailureHandler(function(err) {
        document.getElementById('create-btn').disabled = false;
        document.getElementById('create-btn').textContent = 'Create User';
        showModalError('System error: ' + err.message);
      })
      .clientCreateUser(token, {
        full_name: fname + ' ' + lname,
        username,
        email,
        role,
        branch_id: branch,
        password,
      });
  }

  function showModalError(msg) {
    const el = document.getElementById('modal-error');
    el.textContent = msg;
    el.classList.remove('hidden');
  }
</script>
</body>
</html>
