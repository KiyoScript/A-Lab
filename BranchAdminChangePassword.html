<style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #f8fafc; color: #1e293b; margin: 0;}
    .card { background:#fff; border:1px solid #e2e8f0; border-radius:1rem; box-shadow:0 1px 3px rgba(0,0,0,.06); }
    .field-label { display:block; font-size:11px; font-weight:600; color:#475569; margin-bottom:6px; text-transform:uppercase; letter-spacing:.04em; }
    .field-input { width:100%; border:1px solid #e2e8f0; border-radius:.75rem; padding:.625rem .875rem; font-size:.875rem; color:#1e293b; background:#fff; outline:none; transition:border-color .15s, box-shadow .15s; }
    .field-input:focus { border-color:#93c5fd; box-shadow:0 0 0 3px rgba(147,197,253,.25); }
    .strength-bar-track { height:6px; background:#f1f5f9; border-radius:99px; overflow:hidden; margin-top:6px; }
    .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    #toast { position:fixed; bottom:1.5rem; right:1.5rem; z-index:9999; display:flex; flex-direction:column; gap:.5rem; }
    .toast-item { padding:.625rem 1rem; border-radius:.75rem; font-size:.8125rem; font-weight:600; box-shadow:0 4px 12px rgba(0,0,0,.12); animation:slideIn .2s ease; }
    .toast-success { background:#dcfce7; color:#15803d; }
    .toast-error   { background:#fee2e2; color:#dc2626; }
    @keyframes slideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
</style>
  <div id="toast"></div>

  <div class="max-w-lg mx-auto">
    <!-- Header -->
    <div class="mb-6">
      <h1 class="text-xl font-bold text-slate-800">Change Password</h1>
      <p class="text-sm text-slate-400 mt-1">Update your branch admin account password.</p>
    </div>

    <div class="card p-6 space-y-5">
      <!-- Current Password -->
      <div>
        <label class="field-label">Current Password <span class="text-red-400">*</span></label>
        <div class="relative">
          <input id="f-current" type="password" placeholder="Enter current password" class="field-input pr-10" autocomplete="current-password"/>
          <button type="button" onclick="toggleVis('f-current')"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- New Password -->
      <div>
        <label class="field-label">New Password <span class="text-red-400">*</span></label>
        <div class="relative">
          <input id="f-new" type="password" placeholder="At least 6 characters" class="field-input pr-10"
            autocomplete="new-password" oninput="checkStrength(); checkMatch()"/>
          <button type="button" onclick="toggleVis('f-new')"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
        <div class="strength-bar-track"><div id="strength-bar" class="h-full rounded-full transition-all duration-300" style="width:0%"></div></div>
        <p id="strength-label" class="text-[11px] mt-1 text-slate-400"></p>
      </div>

      <!-- Confirm Password -->
      <div>
        <label class="field-label">Confirm New Password <span class="text-red-400">*</span></label>
        <input id="f-confirm" type="password" placeholder="Re-enter new password" class="field-input"
          autocomplete="new-password" oninput="checkMatch()"/>
        <p id="match-msg" class="text-[11px] mt-1 hidden"></p>
      </div>

      <!-- Submit -->
      <button id="save-btn" onclick="submitChange()"
        class="w-full py-2.5 rounded-xl bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold transition-colors flex items-center justify-center mt-2">
        <span id="save-label">Update Password</span>
      </button>
    </div>
  </div>

<script>
  var alab_token = (new URLSearchParams(window.location.search)).get('token') || localStorage.getItem('alab_token') || '';

  function _checkExpired(res) {
    if (res && res.expired) {
      localStorage.removeItem('alab_token');
      google.script.run.withSuccessHandler(function(url) {
        window.top.location.href = url + '?page=Login';
      }).getScriptUrl();
      return true;
    }
    return false;
  }

  function toggleVis(id) {
    var inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  function checkStrength() {
    var val = document.getElementById('f-new').value;
    var bar = document.getElementById('strength-bar');
    var lbl = document.getElementById('strength-label');
    var score = 0;
    if (val.length >= 6)  score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    var levels = [
      { pct:'0%',   color:'',           label:'' },
      { pct:'25%',  color:'bg-red-400',    label:'Weak' },
      { pct:'50%',  color:'bg-amber-400',  label:'Fair' },
      { pct:'75%',  color:'bg-blue-400',   label:'Good' },
      { pct:'100%', color:'bg-emerald-500',label:'Strong' }
    ];
    var lvl = levels[Math.min(score, 4)];
    bar.style.width = lvl.pct;
    bar.className = 'h-full rounded-full transition-all duration-300 ' + lvl.color;
    lbl.textContent = lvl.label;
    lbl.className = 'text-[11px] mt-1 ' + (score <= 1 ? 'text-red-400' : score <= 2 ? 'text-amber-500' : score <= 3 ? 'text-blue-500' : 'text-emerald-600');
  }

  function checkMatch() {
    var np  = document.getElementById('f-new').value;
    var cp  = document.getElementById('f-confirm').value;
    var msg = document.getElementById('match-msg');
    if (!cp) { msg.classList.add('hidden'); return; }
    msg.classList.remove('hidden');
    if (np === cp) {
      msg.textContent = '✓ Passwords match';
      msg.className = 'text-[11px] mt-1 text-emerald-600';
    } else {
      msg.textContent = '✗ Passwords do not match';
      msg.className = 'text-[11px] mt-1 text-red-500';
    }
  }

  function submitChange() {
    var current = document.getElementById('f-current').value;
    var np      = document.getElementById('f-new').value;
    var cp      = document.getElementById('f-confirm').value;
    if (!current) { showToast('Current password is required.', 'error'); return; }
    if (np.length < 6)  { showToast('New password must be at least 6 characters.', 'error'); return; }
    if (np !== cp)      { showToast('Passwords do not match.', 'error'); return; }
    if (np === current) { showToast('New password cannot be the same as your current password.', 'error'); return; }

    setSaving(true);
    google.script.run
      .withSuccessHandler(function(res) {
        setSaving(false);
        if (_checkExpired(res)) return;
        if (res.success) {
          showToast('Password updated successfully!', 'success');
          document.getElementById('f-current').value = '';
          document.getElementById('f-new').value     = '';
          document.getElementById('f-confirm').value = '';
          document.getElementById('strength-bar').style.width = '0%';
          document.getElementById('strength-label').textContent = '';
          document.getElementById('match-msg').classList.add('hidden');
        } else {
          showToast(res.error || 'Failed to update password.', 'error');
        }
      })
      .withFailureHandler(function(err) {
        setSaving(false);
        showToast('Error: ' + err.message, 'error');
      })
      .handleAdminRequest('CHANGE_OWN_BRANCH_ADMIN_PASSWORD', {
        current_password: current,
        new_password:     np
      }, alab_token);
  }

  function setSaving(v) {
    var btn = document.getElementById('save-btn');
    btn.disabled = v;
    btn.innerHTML = v ? '<span class="spinner"></span>' : '<span id="save-label">Update Password</span>';
  }

  function showToast(msg, type) {
    var el = document.createElement('div');
    el.className = 'toast-item toast-' + (type || 'success');
    el.textContent = msg;
    document.getElementById('toast').appendChild(el);
    setTimeout(function() { el.remove(); }, 3000);
  }
</script>
