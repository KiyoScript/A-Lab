<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A-Lab — Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            mono: ['DM Mono', 'monospace'],
          },
          colors: {
            brand: {
              50:  '#eef6ff',
              100: '#d9eaff',
              400: '#5599ff',
              500: '#2f76f5',
              600: '#1a56eb',
              700: '#1540d8',
            },
          },
          animation: {
            'fade-up': 'fadeUp 0.4s ease both',
          },
          keyframes: {
            fadeUp: {
              '0%':   { opacity: '0', transform: 'translateY(16px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'DM Sans', sans-serif; }

    .input-field {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      background: #f8fafc;
      color: #1e293b;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
      outline: none;
    }
    .input-field:focus {
      border-color: #2f76f5;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(47,118,245,0.12);
    }
    .input-field::placeholder { color: #94a3b8; }
    .input-field.error { border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.1); }

    .btn-primary {
      width: 100%;
      padding: 11px;
      background: #2f76f5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 14px rgba(47,118,245,0.3);
    }
    .btn-primary:hover { background: #1a56eb; box-shadow: 0 6px 20px rgba(47,118,245,0.35); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; box-shadow: none; transform: none; }

    /* Background decoration */
    .bg-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.35;
      pointer-events: none;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.05); }
    }
    .blob-1 { animation: shimmer 8s ease-in-out infinite; }
    .blob-2 { animation: shimmer 10s ease-in-out infinite 2s; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center relative overflow-hidden">

  <!-- Background blobs -->
  <div class="bg-blob blob-1 w-72 h-72 bg-brand-300 top-[-60px] left-[-60px]"></div>
  <div class="bg-blob blob-2 w-96 h-96 bg-indigo-300 bottom-[-80px] right-[-80px]"></div>
  <div class="bg-blob w-48 h-48 bg-cyan-200 top-1/2 left-1/4"></div>

  <!-- Card -->
  <div class="relative z-10 w-full max-w-sm mx-4 animate-fade-up">
    <div class="bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">

      <!-- Card Header -->
      <div class="bg-gradient-to-br from-brand-600 to-brand-700 px-8 py-7 text-white">
        <div class="flex items-center gap-3 mb-4">
          <div class="w-10 h-10 rounded-xl bg-white/20 backdrop-blur flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 3v8.5L4.5 18A2 2 0 006.4 21h11.2a2 2 0 001.9-2.5L15 11.5V3M9 3h6M8 15h8"/>
            </svg>
          </div>
          <div>
            <p class="font-bold text-lg leading-none">A-Lab</p>
            <p class="text-blue-200 text-[10px] font-mono tracking-widest uppercase mt-0.5">Automation Hub</p>
          </div>
        </div>
        <p class="text-sm text-blue-100 leading-relaxed">Sign in to access the laboratory management system.</p>
      </div>

      <!-- Form -->
      <div class="px-8 py-7">
        <div class="space-y-4">

          <!-- Error Banner -->
          <div id="error-banner" class="hidden flex items-start gap-2.5 bg-red-50 border border-red-200 rounded-xl px-4 py-3">
            <svg class="w-4 h-4 text-red-500 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><path stroke-linecap="round" d="M12 8v4m0 4h.01"/>
            </svg>
            <p id="error-text" class="text-xs text-red-600 font-medium"></p>
          </div>

          <!-- Username -->
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1.5">Username</label>
            <input
              type="text"
              id="username"
              class="input-field"
              placeholder="Enter your username"
              autocomplete="username"
              autocapitalize="none"
              onkeydown="handleKeydown(event)"
            />
          </div>

          <!-- Password -->
          <div>
            <div class="flex items-center justify-between mb-1.5">
              <label class="text-xs font-semibold text-slate-600">Password</label>
            </div>
            <div class="relative">
              <input
                type="password"
                id="password"
                class="input-field pr-10"
                placeholder="Enter your password"
                autocomplete="current-password"
                onkeydown="handleKeydown(event)"
              />
              <button
                type="button"
                onclick="togglePassword()"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors"
                title="Show/hide password"
              >
                <svg id="eye-icon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Submit -->
          <button id="login-btn" class="btn-primary mt-2" onclick="handleLogin()">
            Sign In
          </button>

        </div>

        <!-- Footer note -->
        <p class="text-center text-[11px] text-slate-400 mt-5">
          A-Lab Medical Services &nbsp;·&nbsp; Internal Use Only
        </p>
      </div>
    </div>

    <!-- Loading overlay -->
    <div id="loading-overlay" class="hidden absolute inset-0 bg-white/80 backdrop-blur-sm rounded-2xl flex items-center justify-center">
      <div class="flex flex-col items-center gap-3">
        <div class="w-8 h-8 border-2 border-brand-200 border-t-brand-500 rounded-full animate-spin"></div>
        <p class="text-xs text-slate-500 font-medium">Signing in…</p>
      </div>
    </div>
  </div>

  <script>
    function handleKeydown(e) {
      if (e.key === 'Enter') handleLogin();
    }

    function togglePassword() {
      const input = document.getElementById('password');
      const icon  = document.getElementById('eye-icon');
      const show  = input.type === 'password';
      input.type  = show ? 'text' : 'password';
      icon.innerHTML = show
        ? `<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`
        : `<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
    }

    function showError(msg) {
      const banner = document.getElementById('error-banner');
      document.getElementById('error-text').textContent = msg;
      banner.classList.remove('hidden');
      banner.classList.add('flex');
      document.getElementById('username').classList.add('error');
      document.getElementById('password').classList.add('error');
    }

    function clearError() {
      document.getElementById('error-banner').classList.add('hidden');
      document.getElementById('error-banner').classList.remove('flex');
      document.getElementById('username').classList.remove('error');
      document.getElementById('password').classList.remove('error');
    }

    function setLoading(loading) {
      document.getElementById('login-btn').disabled = loading;
      document.getElementById('loading-overlay').classList.toggle('hidden', !loading);
    }

    function handleLogin() {
      clearError();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('Please enter your username and password.');
        return;
      }

      setLoading(true);

      google.script.run
        .withSuccessHandler(function(result) {
          setLoading(false);
          if (result.success) {
            // Store token in session storage for this tab
            sessionStorage.setItem('alab_token', result.token);
            sessionStorage.setItem('alab_user', JSON.stringify(result.user));
            // Redirect to main app
            google.script.run
              .withSuccessHandler(function(url) {
                window.top.location.href = url + '?page=Index&t=' + result.token;
              })
              .getScriptUrl();
          } else {
            showError(result.error || 'Login failed. Please try again.');
          }
        })
        .withFailureHandler(function(err) {
          setLoading(false);
          showError('System error: ' + (err.message || 'Unknown error'));
        })
        .clientLogin(username, password);
    }

    // Auto-focus
    document.getElementById('username').focus();
  </script>
</body>
</html>
