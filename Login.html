<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A-Lab — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    * { font-family: 'DM Sans', sans-serif; }
    body {
      background-color: #f1f5f9;
      background-image: radial-gradient(rgba(47,118,245,0.08) 1px, transparent 1px);
      background-size: 28px 28px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .form-input {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      color: #0f172a;
      width: 100%;
      border-radius: 0.75rem;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      outline: none;
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .form-input::placeholder { color: #94a3b8; }
    .form-input:focus { box-shadow: 0 0 0 2px rgba(47,118,245,0.2); border-color: #2f76f5; }
    .form-input.pr { padding-right: 2.75rem; }
    .eye-btn {
      position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%);
      color: #94a3b8; background: none; border: none; cursor: pointer;
      padding: 0; transition: color 0.15s;
    }
    .eye-btn:hover { color: #475569; }
    input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0px 1000px #f8fafc inset;
      -webkit-text-fill-color: #0f172a;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation: fadeUp 0.35s ease both; }
    .spinner {
      width:18px; height:18px;
      border:2px solid rgba(255,255,255,0.4); border-top-color:#fff;
      border-radius:50%; animation: spin 0.7s linear infinite; display:inline-block;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="w-full max-w-sm fade-up">

    <!-- Logo -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg mb-4"
           style="background:linear-gradient(135deg,#2f76f5,#1540d8)">
        <svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 3v8.5L4.5 18A2 2 0 006.4 21h11.2a2 2 0 001.9-2.5L15 11.5V3"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 3h6M8 15h8"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-slate-800">A-Lab</h1>
      <p class="text-slate-400 text-xs tracking-widest uppercase mt-1" style="font-family:'DM Mono',monospace">Automation Hub</p>
    </div>

    <!-- Card -->
    <div class="rounded-2xl p-7 shadow-lg" style="background:#ffffff;border:1px solid #e2e8f0;">
      <h2 class="text-base font-bold text-slate-800 mb-1">Sign in</h2>
      <p class="text-slate-400 text-xs mb-6">Enter your credentials to continue.</p>

      <!-- Error alert -->
      <div id="error-alert" class="hidden mb-4 items-center gap-2.5 rounded-xl px-4 py-3"
           style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25)">
        <svg class="w-4 h-4 shrink-0 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        </svg>
        <p id="error-msg" class="text-red-500 text-xs font-medium"></p>
      </div>

      <div style="display:flex;flex-direction:column;gap:1rem">
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5">Username</label>
          <input id="username" type="text" placeholder="Enter username" autocomplete="username" class="form-input"/>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5">Password</label>
          <div style="position:relative">
            <input id="password" type="password" placeholder="Enter password" autocomplete="current-password" class="form-input pr"/>
            <button type="button" class="eye-btn" onclick="togglePassword()">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>
        <button id="login-btn" onclick="doLogin()"
          style="width:100%;background:#2f76f5;color:#fff;font-weight:600;padding:0.75rem;border-radius:0.75rem;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:4px;transition:background 0.15s;"
          onmouseover="this.style.background='#1a56eb'" onmouseout="this.style.background='#2f76f5'">
          <span id="login-label">Sign In</span>
        </button>
      </div>
    </div>

    <p class="text-center text-slate-400 text-xs mt-5">A-Lab © 2026 · Automation Hub</p>
  </div>

  <script>
    var scriptUrl = '<?= ScriptApp.getService().getUrl() ?>';

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !document.getElementById('login-btn').disabled) doLogin();
    });

    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) { showError('Please enter both username and password.'); return; }
      if (!scriptUrl) { showError('Page still loading, please try again.'); return; }
      setLoading(true); hideError();

      var roleHint = username.indexOf('@') !== -1 ? 'medtech' : '';

      google.script.run
        .withSuccessHandler(function(res) {
          setLoading(false);
          if (!res.success) { showError(res.error || 'Login failed.'); return; }
          localStorage.setItem('alab_token', res.token);
          if (res.data && res.data.must_change_password) {
            pendingToken = res.token;
            pendingRole  = res.data.role || '';
            document.getElementById('change-pw-modal').classList.remove('hidden');
          } else {
            var targetPage = res.data.role === 'doctor'  ? 'DoctorIndex' :
                             res.data.role === 'medtech' ? 'TechIndex'   : 'Index';
            window.top.location.href = scriptUrl + '?page=' + targetPage + '&token=' + encodeURIComponent(res.token);
          }
        })
        .withFailureHandler(function(err) { setLoading(false); showError('Error: ' + err.message); })
        .handleAdminRequest('LOGIN', { username: username, password: password, role_hint: roleHint }, '');
    }

    function setLoading(v) {
      const btn = document.getElementById('login-btn');
      btn.disabled = v;
      btn.innerHTML = v ? '<span class="spinner"></span>' : '<span id="login-label">Sign In</span>';
    }
    function showError(msg) {
      const el = document.getElementById('error-alert');
      document.getElementById('error-msg').textContent = msg;
      el.classList.remove('hidden'); el.classList.add('flex');
    }
    function hideError() {
      const el = document.getElementById('error-alert');
      el.classList.add('hidden'); el.classList.remove('flex');
    }
  </script>
</body>

<!-- FORCE CHANGE PASSWORD MODAL -->
<div id="change-pw-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
    <div class="w-12 h-12 rounded-full bg-amber-50 flex items-center justify-center mx-auto mb-4">
      <svg class="w-6 h-6 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m0 0v2m0-2h2m-2 0H10m2-9a3 3 0 100 6 3 3 0 000-6z"/>
      </svg>
    </div>
    <h3 class="text-base font-bold text-slate-800 text-center mb-1">Set Your Password</h3>
    <p class="text-xs text-slate-400 text-center mb-5">You must set a new password before continuing.</p>
    <div class="space-y-3">
      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1.5">New Password</label>
        <input id="new-pw" type="password" placeholder="At least 6 characters"
          class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"/>
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1.5">Confirm Password</label>
        <input id="confirm-pw" type="password" placeholder="Re-enter password"
          class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"/>
      </div>
      <div id="pw-error" class="hidden text-xs text-red-500 font-medium"></div>
      <button onclick="submitNewPassword()"
        id="pw-submit-btn"
        class="w-full py-2.5 bg-blue-500 hover:bg-blue-600 text-white text-sm font-semibold rounded-xl transition-colors mt-1">
        Set Password & Continue
      </button>
    </div>
  </div>
</div>

<script>
  var pendingToken = '';
  var pendingRole  = '';

  function submitNewPassword() {
    var np  = document.getElementById('new-pw').value;
    var cp  = document.getElementById('confirm-pw').value;
    var err = document.getElementById('pw-error');
    err.classList.add('hidden');

    if (np.length < 6) { err.textContent = 'Password must be at least 6 characters.'; err.classList.remove('hidden'); return; }
    if (np !== cp)     { err.textContent = 'Passwords do not match.'; err.classList.remove('hidden'); return; }

    var btn = document.getElementById('pw-submit-btn');
    btn.disabled = true; btn.textContent = 'Saving…';

    var onSuccess = function(res) {
      if (res.success) {
        var targetPage = pendingRole === 'doctor' ? 'DoctorIndex' : pendingRole === 'medtech' ? 'TechIndex' : 'Index';
        window.top.location.href = scriptUrl + '?page=' + targetPage + '&token=' + encodeURIComponent(pendingToken);
      } else {
        btn.disabled = false; btn.textContent = 'Set Password & Continue';
        err.textContent = res.error || 'Failed to update password.';
        err.classList.remove('hidden');
      }
    };

    var onFail = function(e) {
      btn.disabled = false; btn.textContent = 'Set Password & Continue';
      err.textContent = 'Error: ' + e.message; err.classList.remove('hidden');
    };

    if (pendingRole === 'medtech') {
      google.script.run
        .withSuccessHandler(onSuccess)
        .withFailureHandler(onFail)
        .handleMedTechRequest('CHANGE_OWN_MT_PASSWORD', { new_password: np }, pendingToken);
    } else {
      google.script.run
        .withSuccessHandler(onSuccess)
        .withFailureHandler(onFail)
        .handleDoctorRequest('CHANGE_OWN_DOCTOR_PASSWORD', { new_password: np }, pendingToken);
    }
  }
</script>

</html>
