<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A-Lab — Automation Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            mono: ['DM Mono', 'monospace'],
          },
          colors: {
            brand: {
              50:  '#eef6ff',
              100: '#d9eaff',
              200: '#bbd8ff',
              300: '#8cbeff',
              400: '#5599ff',
              500: '#2f76f5',
              600: '#1a56eb',
              700: '#1540d8',
              800: '#1836af',
              900: '#1a3189',
            },
            alab: {
              red: '#e03131',
              dark: '#0f172a',
              navy: '#1e293b',
              slate: '#334155',
            }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'DM Sans', sans-serif; }

    /* Sidebar active state */
    .nav-link {
      transition: all 0.18s ease;
      position: relative;
    }
    .nav-link:hover {
      background: rgba(47, 118, 245, 0.08);
      color: #2f76f5;
    }
    .nav-link.active {
      background: rgba(47, 118, 245, 0.12);
      color: #2f76f5;
      font-weight: 600;
    }
    .nav-link.active::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: #2f76f5;
      border-radius: 0 2px 2px 0;
    }

    /* Sidebar collapse */
    #sidebar {
      transition: width 0.25s cubic-bezier(.4,0,.2,1);
    }
    #sidebar.collapsed {
      width: 64px;
    }
    #sidebar.collapsed .nav-label,
    #sidebar.collapsed .brand-name,
    #sidebar.collapsed .nav-section-label {
      display: none;
    }
    #sidebar.collapsed .nav-link {
      justify-content: center;
      padding-left: 0;
      padding-right: 0;
    }
    #sidebar.collapsed .logo-wrap {
      justify-content: center;
    }

    /* Content area shift */
    #main-wrapper {
      transition: margin-left 0.25s cubic-bezier(.4,0,.2,1);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }

    /* Avatar ring */
    .avatar-ring {
      box-shadow: 0 0 0 2px #fff, 0 0 0 4px #2f76f5;
    }

    /* Notification badge pulse */
    @keyframes ping-slow {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.3); }
    }
    .badge-pulse { animation: ping-slow 2s infinite; }

    /* Page fade-in */
    iframe {
      border: none;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 flex h-screen overflow-hidden">

  <!-- ═══════════════════════════════════════════ SIDEBAR -->
  <aside id="sidebar" class="w-60 bg-white border-r border-slate-100 flex flex-col shrink-0 h-screen z-30 shadow-sm">

    <!-- Logo -->
    <div class="logo-wrap flex items-center gap-3 px-5 py-5 border-b border-slate-100">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center shrink-0 shadow">
        <!-- Beaker icon -->
        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 3v8.5L4.5 18A2 2 0 006.4 21h11.2a2 2 0 001.9-2.5L15 11.5V3"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 3h6M8 15h8"/>
        </svg>
      </div>
      <div class="brand-name">
        <p class="text-base font-700 text-alab-dark leading-none font-bold">A-Lab</p>
        <p class="text-[10px] text-slate-400 font-mono tracking-widest uppercase mt-0.5">Automation Hub</p>
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-0.5">

      <!-- Main -->
      <p class="nav-section-label text-[10px] font-semibold text-slate-400 uppercase tracking-widest px-3 mb-2 mt-1">Main</p>

      <a href="Dashboard.html" target="content-frame" onclick="setActive(this)"
         class="nav-link active flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-slate-600 cursor-pointer">
        <svg class="w-4.5 h-4.5 w-[18px] h-[18px] shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
        </svg>
        <span class="nav-label">Dashboard</span>
      </a>

      <!-- Reference Data -->
      <p class="nav-section-label text-[10px] font-semibold text-slate-400 uppercase tracking-widest px-3 mb-2 mt-4">Reference Data</p>

      <a href="#" onclick="setActive(this); loadPlaceholder('Branches')"
         class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-slate-600 cursor-pointer">
        <svg class="w-[18px] h-[18px] shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 21h18M9 21V7l3-4 3 4v14M9 11h6"/>
        </svg>
        <span class="nav-label">Branches</span>
      </a>

      <a href="#" onclick="setActive(this); loadPlaceholder('Departments')"
         class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-slate-600 cursor-pointer">
        <svg class="w-[18px] h-[18px] shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0H5m14 0h2M5 21H3M10 9h4m-4 4h4"/>
        </svg>
        <span class="nav-label">Departments</span>
      </a>

      <a href="#" onclick="setActive(this); loadPlaceholder('Lab Services')"
         class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-slate-600 cursor-pointer">
        <svg class="w-[18px] h-[18px] shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 3v8.5L4.5 18A2 2 0 006.4 21h11.2a2 2 0 001.9-2.5L15 11.5V3M9 3h6"/>
        </svg>
        <span class="nav-label">Lab Services</span>
      </a>

      <a href="#" onclick="setActive(this); loadPlaceholder('Branch Labs')"
         class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-slate-600 cursor-pointer">
        <svg class="w-[18px] h-[18px] shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 7h16M4 12h10M4 17h6M17 14l2 2 4-4"/>
        </svg>
        <span class="nav-label">Branch Labs</span>
      </a>

      <!-- People -->
      <p class="nav-section-label text-[10px] font-semibold text-slate-400 uppercase tracking-widest px-3 mb-2 mt-4">People</p>

      <a href="#" onclick="setActive(this); loadPlaceholder('Doctors')"
         class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-slate-600 cursor-pointer">
        <svg class="w-[18px] h-[18px] shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5.121 17.804A9 9 0 1118.88 6.196M15 11a3 3 0 11-6 0 3 3 0 016 0zm3 7v1a2 2 0 01-2 2h-1"/>
        </svg>
        <span class="nav-label">Doctors</span>
      </a>

      <a href="#" onclick="setActive(this); loadPlaceholder('Patients')"
         class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-slate-600 cursor-pointer">
        <svg class="w-[18px] h-[18px] shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-1a4 4 0 00-5.196-3.762M9 11a4 4 0 100-8 4 4 0 000 8zm-6 9v-1a4 4 0 014-4h4a4 4 0 014 4v1"/>
        </svg>
        <span class="nav-label">Patients</span>
      </a>

      <a href="#" onclick="setActive(this); loadPlaceholder('Med Techs')"
         class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-slate-600 cursor-pointer">
        <svg class="w-[18px] h-[18px] shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01m-.01 4h.01"/>
        </svg>
        <span class="nav-label">Med Techs</span>
      </a>

      <!-- Discounts -->
      <p class="nav-section-label text-[10px] font-semibold text-slate-400 uppercase tracking-widest px-3 mb-2 mt-4">Discounts</p>

      <a href="#" onclick="setActive(this); loadPlaceholder('Discounts')"
         class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-slate-600 cursor-pointer">
        <svg class="w-[18px] h-[18px] shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M17 17h.01M7.05 7.05l9.9 9.9M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span class="nav-label">Discounts</span>
      </a>

      <a href="#" onclick="setActive(this); loadPlaceholder('Patient Discounts')"
         class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-slate-600 cursor-pointer">
        <svg class="w-[18px] h-[18px] shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 9a3 3 0 11-6 0 3 3 0 016 0zM4 20a8 8 0 0116 0"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 13.5L17 17"/>
        </svg>
        <span class="nav-label">Patient Discounts</span>
      </a>

    </nav>

    <!-- Bottom: User -->
    <div class="border-t border-slate-100 p-4 flex items-center gap-3">
      <img src="https://ui-avatars.com/api/?name=Admin+User&background=2f76f5&color=fff&size=64&font-size=0.4"
           class="w-8 h-8 rounded-full avatar-ring shrink-0" alt="User"/>
      <div class="nav-label flex-1 min-w-0">
        <p class="text-xs font-semibold text-slate-700 truncate">Admin User</p>
        <p class="text-[10px] text-slate-400 truncate">admin@alab.com</p>
      </div>
      <button class="nav-label text-slate-400 hover:text-alab-red transition-colors" title="Logout">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1"/>
        </svg>
      </button>
    </div>
  </aside>

  <!-- ═══════════════════════════════════════════ MAIN AREA -->
  <div id="main-wrapper" class="flex-1 flex flex-col overflow-hidden">

    <!-- NAVBAR -->
    <header class="h-14 bg-white border-b border-slate-100 flex items-center px-5 gap-4 shrink-0 shadow-sm z-20">

      <!-- Sidebar Toggle -->
      <button onclick="toggleSidebar()" class="text-slate-400 hover:text-brand-500 transition-colors p-1 rounded-lg hover:bg-slate-50">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>

      <!-- Breadcrumb / Page Title -->
      <div class="flex items-center gap-2 text-sm">
        <span class="text-slate-400">A-Lab</span>
        <span class="text-slate-300">/</span>
        <span id="page-title" class="text-slate-700 font-semibold">Dashboard</span>
      </div>

      <div class="flex-1"></div>

      <!-- Search -->
      <div class="relative hidden sm:block">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="text" placeholder="Search..."
          class="pl-9 pr-4 py-1.5 text-sm bg-slate-50 border border-slate-200 rounded-lg w-52 focus:outline-none focus:ring-2 focus:ring-brand-300 focus:border-brand-400 transition"/>
      </div>

      <!-- Notification Bell -->
      <button class="relative p-2 text-slate-400 hover:text-brand-500 hover:bg-slate-50 rounded-lg transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 00-9.33-5M15 17H9m6 0a3 3 0 01-6 0"/>
        </svg>
        <span class="badge-pulse absolute top-1.5 right-1.5 w-2 h-2 rounded-full bg-alab-red"></span>
      </button>

      <!-- Avatar -->
      <div class="flex items-center gap-2 cursor-pointer group">
        <img src="https://ui-avatars.com/api/?name=Admin+User&background=2f76f5&color=fff&size=64&font-size=0.4"
             class="w-8 h-8 rounded-full avatar-ring" alt="User"/>
        <svg class="w-4 h-4 text-slate-400 group-hover:text-slate-600 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
        </svg>
      </div>
    </header>

    <!-- CONTENT FRAME -->
    <main class="flex-1 overflow-hidden bg-slate-50">
      <iframe id="content-frame" name="content-frame"
        src="Dashboard.html"
        class="w-full h-full">
      </iframe>

      <!-- Placeholder shown when iframe page is not yet created -->
      <div id="placeholder" class="hidden w-full h-full flex flex-col items-center justify-center gap-4">
        <div class="w-16 h-16 rounded-2xl bg-brand-50 flex items-center justify-center">
          <svg class="w-8 h-8 text-brand-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-2a4 4 0 014-4h0a4 4 0 014 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"/>
          </svg>
        </div>
        <p class="text-slate-500 text-sm font-medium" id="placeholder-label">Page coming soon</p>
        <p class="text-slate-400 text-xs">This module will be available in a future sprint.</p>
      </div>
    </main>
  </div>

  <script>
    function setActive(el) {
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
      el.classList.add('active');
      const label = el.querySelector('.nav-label')?.textContent.trim() || 'Dashboard';
      document.getElementById('page-title').textContent = label;
    }

    function loadPlaceholder(name) {
      const frame = document.getElementById('content-frame');
      const placeholder = document.getElementById('placeholder');
      // Show placeholder, hide iframe
      frame.classList.add('hidden');
      placeholder.classList.remove('hidden');
      placeholder.classList.add('flex');
      document.getElementById('placeholder-label').textContent = name + ' — Coming Soon';
    }

    // When Dashboard link is clicked, show iframe again
    document.querySelector('a[href="Dashboard.html"]').addEventListener('click', function () {
      const frame = document.getElementById('content-frame');
      const placeholder = document.getElementById('placeholder');
      frame.classList.remove('hidden');
      placeholder.classList.add('hidden');
      placeholder.classList.remove('flex');
    });

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('collapsed');
    }
  </script>
</body>
</html>
